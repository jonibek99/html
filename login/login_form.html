<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login form,</title>
    <style>
     *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        .place{
            height: 230px;
            text-align: center;
            width: 400px;
            text-align: center;
            margin-top: 20px;
            background-color: whitesmoke;
            text-align: left;
            margin-left: 10px;
        }
        .place h1{
            text-align: center;
            margin: 10px;
            margin-left: 10px;
            font-size: 30px;


        }
        .place input{
            margin: 10px;
            width: 360px;
        }
        .place label{
            margin: 10px;
            color: black;
        }
        button{
            border: none;
            font-size:  25px;
            width: 100px;
            height: 30px;
            text-align: center;
            margin-left: 150px;
            margin-top: 20px;
            background-color: rgb(90, 197, 90);
            color: white;
        }
      body{
        margin-left: 30%;
      }
    </style>
</head>
<body>
    <div class="place">
        <h1>
            Loging  Form
        </h1>
        
        <label for="a">Email id</label> <br>
        <input type="email" id="a"> <br>
        <label for="b"> Password</label><br>
        <input type="password" id="b">
        <button>LOGIN</button>
    </div>
</html>
